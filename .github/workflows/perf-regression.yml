name: Perf Regression

# Nightly + on-demand k6 run against the docker-compose test fixture.
# Compares p99 of the sustained scenario against perf/baseline.json; fails
# if the regression exceeds PERF_REGRESSION_THRESHOLD_PCT (default 20).
#
# Not a per-PR gate — the runner is noisy enough that per-PR signal is
# unreliable. PRs still get perf-sensitive signal from unit / integration
# tests; this workflow catches sustained drift over time.

on:
  schedule:
    - cron: '30 6 * * *'  # daily 06:30 UTC, after the nightly audit
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: perf-regression
  cancel-in-progress: false

jobs:
  k6:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POSTGRES_TEST_PORT: 55432
      POSTGRES_URL: postgres://yapbay:yapbay@127.0.0.1:55432/yapbay_test
      JWT_SECRET: ci-test-secret-not-used-outside-ci
      NODE_ENV: test
      PORT: 3011
      # Loose threshold to start; tighten after a few stable nightlies.
      PERF_REGRESSION_THRESHOLD_PCT: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start Postgres fixture
        # `--wait` blocks until every service with a healthcheck reports
        # healthy (or times out). Replaces the earlier `ps | grep` check,
        # which matched orphaned containers too.
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap DB schema + migrations
        run: bash scripts/test-db-bootstrap.sh

      - name: Build app
        run: pnpm build

      - name: Start API in background
        run: |
          YAPBAY_TEST_DB_OVERRIDE=1 node dist/server.js &
          echo $! > api.pid
          READY=0
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:3011/health/live > /dev/null; then
              READY=1
              echo "api ready after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$READY" != "1" ]; then
            echo "api did not become ready within 30s — aborting" >&2
            kill "$(cat api.pid)" 2>/dev/null || true
            exit 1
          fi

      - name: Install k6
        run: |
          set -euo pipefail
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Mint a test JWT
        id: jwt
        # Read the secret via `process.env` in node rather than shell
        # interpolation, so a JWT_SECRET containing quotes, `$()`, or
        # backticks can't rewrite the command. The env var is set at the
        # job level — this hardens against future drift.
        run: |
          TOKEN=$(node -e '
            const jwt = require("jsonwebtoken");
            console.log(jwt.sign(
              { sub: "0xperftest", role: "user" },
              process.env.JWT_SECRET,
              { algorithm: "HS256", expiresIn: "1h" },
            ));
          ')
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      # Shorter duration than the local default (30s vs 5m) so the workflow
      # fits inside its 30-minute budget. Baseline numbers committed to
      # perf/baseline.json MUST be collected with the same duration.
      - name: Run k6 sustained scenario (30s)
        env:
          JWT: ${{ steps.jwt.outputs.token }}
        # k6 exit codes:
        #   0  — all thresholds passed
        #   99 — thresholds exceeded (acceptable here: we still want to
        #        compare against baseline so ops sees the trend)
        #   any other non-zero — k6 crashed or the script is broken; that
        #        is a workflow failure, not a SLO breach.
        run: |
          set +e
          k6 run \
            --summary-export=perf/last-run.json \
            --stage 0s:0,5s:100,30s:100 \
            -e BASE_URL=http://127.0.0.1:3011 \
            -e JWT="$JWT" \
            -e TRADE_ID=1 \
            -e ESCROW_ID=1 \
            -e NETWORK_NAME=solana-devnet \
            scripts/load-test/escrow-create.js
          code=$?
          set -e
          case $code in
            0|99) echo "k6 completed with exit $code" ;;
            *)    echo "k6 failed with unexpected exit $code" >&2; exit $code ;;
          esac

      - name: Compare against baseline
        run: node scripts/load-test/compare-baseline.mjs perf/last-run.json perf/baseline.json

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: k6-summary
          path: perf/last-run.json
          retention-days: 30

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" || true; fi
          docker compose -f docker-compose.test.yml down -v || true
