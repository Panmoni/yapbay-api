name: Dependency Audit

# Runs:
#   - on every push to main (fast feedback on merges)
#   - on every pull request (block vulnerable deps from reaching main)
#   - daily at 06:00 UTC (catches newly-disclosed CVEs against existing deps)
#   - manually via workflow_dispatch
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Read-only contents; needs issues: write to post failure notifications.
permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env is guaranteed to be available in step `if:` expressions.
    # (Step-level env in the same step's `if:` is unreliable.)
    env:
      HAS_SMTP: ${{ secrets.SMTP_HOST != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: yarn audit (moderate+)
        id: yarn_audit
        run: |
          set -o pipefail
          yarn audit --level moderate | tee yarn-audit.txt

      # npm audit requires a package-lock.json. We consolidated on yarn so
      # package-lock.json is normally absent. Only run npm audit if one
      # happens to be present (e.g. someone ran `npm install` locally).
      - name: npm audit (moderate+)
        id: npm_audit
        if: always() && hashFiles('package-lock.json') != ''
        run: |
          set -o pipefail
          npm audit --audit-level=moderate 2>&1 | tee npm-audit.txt

      # On failure, open a GitHub issue tagged [security]. GitHub's
      # notification system emails me@georgedonnelly.com when the configured
      # account owner's notification email is set to that address.
      - name: Open issue on audit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Ensure the `security` label exists — idempotent.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'security',
                color: 'd73a4a',
                description: 'Dependency or code security issue',
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = already exists
            }

            // Neutralize any triple-backticks in audit output so they don't
            // escape the markdown code fence in the issue body.
            const sanitize = (s) => s.replace(/```/g, '`` `');
            const yarn = fs.existsSync('yarn-audit.txt')
              ? sanitize(fs.readFileSync('yarn-audit.txt', 'utf8').slice(-4000))
              : '(no yarn audit output)';
            const npm = fs.existsSync('npm-audit.txt')
              ? sanitize(fs.readFileSync('npm-audit.txt', 'utf8').slice(-4000))
              : '(no npm audit output)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[security] Dependency audit failed on ${context.ref}`;
            const body = [
              `Dependency audit failed in CI.`,
              ``,
              `- **Workflow run**: ${runUrl}`,
              `- **Trigger**: ${context.eventName}`,
              `- **Ref**: ${context.ref}`,
              `- **SHA**: ${context.sha}`,
              ``,
              `### yarn audit (tail)`,
              '```',
              yarn,
              '```',
              ``,
              `### npm audit (tail)`,
              '```',
              npm,
              '```',
              ``,
              `Fix by either:`,
              `- upgrading the parent package, or`,
              `- pinning a patched transitive via \`resolutions\` (yarn) and \`overrides\` (npm) in \`package.json\`.`,
              ``,
              `Close this issue once \`yarn audit --level moderate\` and \`npm audit --audit-level=moderate\` are clean.`,
            ].join('\n');

            // Avoid duplicate issues: search for an open one with the same title.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
              per_page: 50,
            });
            const dup = existing.data.find((i) => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `New failure on ${context.sha}. ${runUrl}`,
              });
              core.info(`Commented on existing issue #${dup.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security'],
              });
              core.info(`Opened issue #${created.data.number}`);
            }

      # Direct SMTP email as a belt-and-braces backup to GitHub notifications.
      # Requires these repo secrets to be set:
      #   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
      # Without them this step silently skips (see job-level HAS_SMTP env).
      - name: Email me@georgedonnelly.com on audit failure
        if: failure() && env.HAS_SMTP == 'true'
        uses: dawidd6/action-send-mail@2cea9617b09d79a095af21254fbcb7ae95903dde  # v3.12.0
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: '[yapbay-api] Dependency audit failed on ${{ github.ref_name }}'
          to: me@georgedonnelly.com
          from: ${{ secrets.SMTP_USER }}
          body: |
            Dependency audit failed in CI.

            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }}
            Ref: ${{ github.ref }}
            SHA: ${{ github.sha }}

            See the run for yarn audit and npm audit details. A GitHub issue
            tagged [security] has also been opened / commented on.
