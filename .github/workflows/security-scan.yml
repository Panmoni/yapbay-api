name: Security Scan

# Source-code security: Semgrep SAST + gitleaks secret scanning. Runs on
# every PR and push to main. Failures block merges. Companion to
# `audit.yml` (dependency CVEs) and `image-scan.yml` (container scanning).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # Needed only for PR annotations from Semgrep.
  pull-requests: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      # Install via pip instead of pulling the `returntocorp/semgrep` container
      # — the Docker Hub pull has been flaky and the pip install is equivalent.
      # Pin exactly so scan results stay reproducible; refresh quarterly.
      - name: Install semgrep
        run: pip install --no-cache-dir semgrep==1.159.0

      # Registry rulesets cover common CVE patterns (OWASP top-10, JS/TS
      # specific footguns). Custom yapbay rules in .semgrep.yml layer on
      # financial-domain checks (decimal safety, raw JSON.parse).
      - name: Run Semgrep (custom + registry)
        run: |
          semgrep scan \
            --config=.semgrep.yml \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --error \
            --severity=ERROR \
            --exclude=dist \
            --exclude=node_modules \
            --exclude=backups \
            --exclude=logs

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # gitleaks scans history for leaks in past commits too. Shallow
          # clone misses those — fetch full history on push events.
          fetch-depth: 0

      # Run the gitleaks binary directly rather than gitleaks-action@v2,
      # which requires a paid GITLEAKS_LICENSE for organization repos.
      # The scanner itself is MIT-licensed; only the Action wrapper is gated.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSL -o gitleaks.tar.gz "${base}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o checksums.txt   "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          # Verify the tarball before extracting. --ignore-missing lets us keep
          # only the linux_x64 line relevant to this runner; any mismatch aborts.
          grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" checksums.txt \
            | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1 \
            --source .
