# Ephemeral Postgres for the mocha integration tests.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   scripts/test-db-bootstrap.sh   # applies schema.sql + migrations to the DB
#   YAPBAY_TEST_DB_OVERRIDE=1 \
#     POSTGRES_URL=postgres://yapbay:yapbay@127.0.0.1:55432/yapbay_test \
#     JWT_SECRET=test NODE_ENV=test \
#     pnpm test
#   docker compose -f docker-compose.test.yml down -v
#
# Port 55432 avoids collision with the dev DB on 5432/15433. The volume is
# intentionally NOT persisted — every `up` starts from an empty DB.

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: yapbay-api-postgres-test
    environment:
      # Credentials default to the convention `yapbay/yapbay` for local test
      # runs; override with env vars (e.g. in CI) without editing this file.
      POSTGRES_USER: ${POSTGRES_TEST_USER:-yapbay}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-yapbay}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-yapbay_test}
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yapbay -d yapbay_test']
      interval: 2s
      timeout: 2s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data  # in-memory, fastest teardown
