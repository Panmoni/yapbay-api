name: Release

# Automated semver + CHANGELOG + git tag + GitHub Release on push to main.
# Commit message convention (Conventional Commits) drives the bump level:
#   - feat:     minor
#   - fix/perf/refactor:  patch
#   - BREAKING CHANGE footer or !: major
#   - docs/style/test/build/ci/chore: no release
#
# We don't publish to npm — yapbay-api is a service, not a library — so the
# @semantic-release/npm plugin runs with publish=false just to bump
# package.json. The resulting commit is pushed back to main with [skip ci]
# so it doesn't loop.

on:
  push:
    branches: [main]

permissions:
  contents: write        # push CHANGELOG + package.json bump, create tags
  issues: write          # comment on released issues
  pull-requests: write   # comment on released PRs

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip if the commit that triggered this workflow was itself the release
    # bump (avoid infinite loops).
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # semantic-release needs full history for commit analysis
          persist-credentials: true

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          # semantic-release requires Node ^22.14 || >=24.10 since its
          # 2026-03 release. The API runtime still targets Node 20 — this
          # is only the version used to run the release tooling in CI.
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Explicit identity on the `chore(release)` commits that
      # @semantic-release/git pushes back to main. The plugin has its own
      # `semantic-release-bot` fallback, but pinning to the GitHub-issued
      # github-actions identity keeps release commits consistent with other
      # automation in this repo and plays cleanly with any future commit
      # signing / verified-author rules.
      - name: Configure git identity for release bot
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
