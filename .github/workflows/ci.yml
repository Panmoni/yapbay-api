name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
  workflow_dispatch:

# CI does not need any GitHub API writes.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Biome check
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  # Advisory-only for now. Wired up but not required — the current Mocha suite
  # depends on a live Postgres + blockchain fixtures that aren't reproducible
  # in CI yet. Flip `continue-on-error: false` and mark this job a required
  # check once the suite is CI-ready (see plan M5 fallback strategy).
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yapbay
          POSTGRES_PASSWORD: yapbay
          POSTGRES_DB: yapbay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yapbay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_URL: postgres://yapbay:yapbay@localhost:5432/yapbay_test
      JWT_SECRET: ci-test-secret-not-used-outside-ci
      NODE_ENV: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply schema
        run: psql "$POSTGRES_URL" -f schema.sql

      - name: Run tests
        run: npm test
