name: Mutation Tests

# Stryker runs nightly against the financial hot path (decimalMath,
# idempotency, safeJson). Slow — not a per-PR gate. Break threshold of
# 70% mutation score; low/high thresholds surface as informational colors.

on:
  schedule:
    - cron: '0 5 * * *'  # daily 05:00 UTC, after the dependency audit
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # open an issue on regression

concurrency:
  group: mutation-test
  cancel-in-progress: false  # don't interrupt long runs

jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run Stryker
        run: pnpm exec stryker run

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 30
