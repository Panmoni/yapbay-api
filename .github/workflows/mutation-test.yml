name: Mutation Tests

# Stryker runs nightly against the financial hot path (decimalMath,
# idempotency, safeJson). Slow — not a per-PR gate. Break threshold of
# 70% mutation score; low/high thresholds surface as informational colors.

on:
  schedule:
    - cron: '0 5 * * *'  # daily 05:00 UTC, after the dependency audit
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # open an issue on regression

concurrency:
  group: mutation-test
  cancel-in-progress: false  # don't interrupt long runs

jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run Stryker
        run: pnpm exec stryker run

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 30
