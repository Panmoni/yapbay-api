name: Security Scan

# Source-code security: Semgrep SAST + gitleaks secret scanning. Runs on
# every PR and push to main. Failures block merges. Companion to
# `audit.yml` (dependency CVEs) and `image-scan.yml` (container scanning).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # Needed only for PR annotations from Semgrep.
  pull-requests: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Semgrep's official container is pinned by SHA. When refreshing, update
    # both the SHA and the date-comment so reviewers can tell how stale the
    # pin is without external lookups. Refresh at least quarterly.
    # Pinned: returntocorp/semgrep:1 (2026-04-12)
    container:
      image: returntocorp/semgrep@sha256:0f4f2226ad29cde43c80bc4fbc8050c6c48afea3cf3dbfe8cc17e4e9ff7a6a3f
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Registry rulesets cover common CVE patterns (OWASP top-10, JS/TS
      # specific footguns). Custom yapbay rules in .semgrep.yml layer on
      # financial-domain checks (decimal safety, raw JSON.parse).
      - name: Run Semgrep (custom + registry)
        run: |
          semgrep scan \
            --config=.semgrep.yml \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --error \
            --severity=ERROR \
            --exclude=dist \
            --exclude=node_modules \
            --exclude=backups \
            --exclude=logs

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # gitleaks scans history for leaks in past commits too. Shallow
          # clone misses those — fetch full history on push events.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
