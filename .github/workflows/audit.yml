name: Dependency Audit

# Runs:
#   - on every push to main (fast feedback on merges)
#   - on every pull request (block vulnerable deps from reaching main)
#   - daily at 06:00 UTC (catches newly-disclosed CVEs against existing deps)
#   - manually via workflow_dispatch
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Read-only contents; needs issues: write to post failure notifications.
permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env is guaranteed to be available in step `if:` expressions.
    # (Step-level env in the same step's `if:` is unreliable.)
    env:
      HAS_SMTP: ${{ secrets.SMTP_HOST != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (moderate+)
        id: pnpm_audit
        # npm retired the quick-audit endpoint in 2026 (HTTP 410). pnpm 10.x
        # still calls it, so a raw exit-1 can mean either "real vulns found"
        # or "upstream endpoint is gone". Tease them apart so the scheduled
        # run doesn't open a bogus [security] issue every night until pnpm
        # ships the bulk-advisory endpoint.
        run: |
          set -o pipefail
          if pnpm audit --audit-level moderate | tee pnpm-audit.txt; then
            exit 0
          fi
          if grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" pnpm-audit.txt; then
            echo "::warning::pnpm audit endpoint unreachable (upstream 410 / retired endpoint)"
            echo "This is not a vulnerability finding. Skipping until pnpm upgrades."
            exit 0
          fi
          exit 1

      # On failure, open a GitHub issue tagged [security]. GitHub's
      # notification system emails me@georgedonnelly.com when the configured
      # account owner's notification email is set to that address.
      - name: Open issue on audit failure
        if: failure()
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            const fs = require('fs');

            // Ensure the `security` label exists — idempotent.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'security',
                color: 'd73a4a',
                description: 'Dependency or code security issue',
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = already exists
            }

            // Neutralize any triple-backticks in audit output so they don't
            // escape the markdown code fence in the issue body.
            const sanitize = (s) => s.replace(/```/g, '`` `');
            const pnpmOut = fs.existsSync('pnpm-audit.txt')
              ? sanitize(fs.readFileSync('pnpm-audit.txt', 'utf8').slice(-4000))
              : '(no pnpm audit output)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[security] Dependency audit failed on ${context.ref}`;
            const body = [
              `Dependency audit failed in CI.`,
              ``,
              `- **Workflow run**: ${runUrl}`,
              `- **Trigger**: ${context.eventName}`,
              `- **Ref**: ${context.ref}`,
              `- **SHA**: ${context.sha}`,
              ``,
              `### pnpm audit (tail)`,
              '```',
              pnpmOut,
              '```',
              ``,
              `Fix by either:`,
              `- upgrading the parent package, or`,
              `- pinning a patched transitive via \`pnpm.overrides\` in \`package.json\`.`,
              ``,
              `Close this issue once \`pnpm audit --audit-level moderate\` is clean.`,
            ].join('\n');

            // Avoid duplicate issues: search for an open one with the same title.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
              per_page: 50,
            });
            const dup = existing.data.find((i) => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `New failure on ${context.sha}. ${runUrl}`,
              });
              core.info(`Commented on existing issue #${dup.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security'],
              });
              core.info(`Opened issue #${created.data.number}`);
            }

      # Direct SMTP email as a belt-and-braces backup to GitHub notifications.
      # Requires these repo secrets to be set:
      #   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
      # Without them this step silently skips (see job-level HAS_SMTP env).
      - name: Email me@georgedonnelly.com on audit failure
        if: failure() && env.HAS_SMTP == 'true'
        uses: dawidd6/action-send-mail@2cea9617b09d79a095af21254fbcb7ae95903dde  # v3.12.0
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: '[yapbay-api] Dependency audit failed on ${{ github.ref_name }}'
          to: me@georgedonnelly.com
          from: ${{ secrets.SMTP_USER }}
          body: |
            Dependency audit failed in CI.

            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }}
            Ref: ${{ github.ref }}
            SHA: ${{ github.sha }}

            See the run for pnpm audit details. A GitHub issue tagged
            [security] has also been opened / commented on.
